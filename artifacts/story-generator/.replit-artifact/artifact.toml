kind = "web"
previewPath = "/"
title = "AI Story Generator"
version = "1.0.0"
id = "artifacts/story-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24976
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/story-generator run dev"

[services.env]
PORT = "24976"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/story-generator", "run", "build"]
publicDir = "artifacts/story-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
