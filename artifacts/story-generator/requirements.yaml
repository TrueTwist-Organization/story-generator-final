packages:
  "framer-motion": "For cinematic page transitions, scene text reveals, and glowing button animations"
  "zustand": "For simple global state management to share the generated story between the home page and the full-screen viewer"
  "clsx": "Utility for conditionally joining class names"
  "tailwind-merge": "Utility to cleanly merge tailwind classes in custom components"
  "lucide-react": "For beautiful consistent icons"

images:
  - path: "artifacts/story-generator/public/images/hero-bg.png"
    description: "Cinematic, dark, moody fantasy landscape with glowing ethereal purple and gold light, mystical particles, high-end digital art style"
    aspect_ratio: "16:9"
  - path: "artifacts/story-generator/public/images/demo-nature.png"
    description: "Breathtaking enchanted forest with glowing bioluminescent plants and a mystical waterfall, deep rich greens and teals"
    aspect_ratio: "9:16"
  - path: "artifacts/story-generator/public/images/demo-princess.png"
    description: "Elegant dark fantasy castle interior with glowing crystal chandeliers and a mysterious silhouette, rich purples and gold"
    aspect_ratio: "9:16"
  - path: "artifacts/story-generator/public/images/demo-anime.png"
    description: "Cyberpunk anime cityscape at night with neon lights and rain reflecting on streets, vivid magenta and cyan"
    aspect_ratio: "9:16"

notes:
  - Images generated by API return base64 strings. We will format them as `data:image/jpeg;base64,${b64_json}` for rendering.
  - Audio generated by API returns base64 strings. We will format them as `data:audio/${format};base64,${audioBase64}` for playback.
  - Using CSS scroll-snap for the Reels-like vertical swiping experience.
  - The Orval generated hooks are imported from `@workspace/api-client-react`.
